baseURL = 'https://eyashi.github.io/'
languageCode = 'en-us'
title = "Ed Yashin"
theme = 'PaperMod'
[pagination]
  pagerSize = 10

enableRobotsTXT = true

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = true
    style = 'monokai'
  [markup.goldmark.renderer]
    unsafe = true

[params]
  env = 'production'
  description = "A little about everything, and a lot about some things."
  author = 'Ed Yashin'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  math = true

  [params.homeInfoParams]
    Title = "hello, i am ed yashin"
    Content = """
i am on a mission to learn a little about everything, and a lot about some things.

i am employed as an automation engineer at [ArsenalBio](https://www.arsenalbio.com/).
in my freetime, i tinker with iot, 3d printers, and anything else i can get my hands on.
"""

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/eyashi'
  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://www.linkedin.com/in/eyashin/'

  [params.cover]
    linkFullImages = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ['title', 'permalink', 'summary', 'content']

[[menu.main]]
  identifier = 'home'
  name = 'Home'
  url = '/'
  weight = 10

[[menu.main]]
  identifier = 'blog'
  name = 'Blog'
  url = '/posts/'
  weight = 20

[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 30

[[menu.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']
